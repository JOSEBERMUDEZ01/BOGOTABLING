backend:
  name: git-gateway
  branch: main

media_folder: "public/images/products"
public_folder: "/images/products"

locale: es

collections:
  - name: "products"
    label: "Productos"
    label_singular: "Producto"
    folder: "content/products"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: nombre
    summary: "{{nombre}} — {{categoria}}"
    fields:
      - label: "Nombre del producto"
        name: "nombre"
        widget: "string"
        hint: "Ej: Submariner Dorado"

      - label: "Categoría"
        name: "categoria"
        widget: "select"
        options:
          - { label: "⌚ Relojes para Hombre", value: "relojes-hombre" }
          - { label: "⌚ Relojes para Dama",   value: "relojes-dama" }
          - { label: "💍 Anillos Oro Rosa",    value: "anillos-oro-rosa" }
          - { label: "💛 Anillos Oro 18k",     value: "anillos-oro-18k" }
          - { label: "📿 Pulseras",             value: "pulseras" }
          - { label: "⛓ Cadenas",              value: "cadenas" }

      - label: "Precio"
        name: "precio"
        widget: "string"
        default: "Consultar"
        hint: "Ej: $350.000 o 'Consultar'"

      - label: "Imagen principal"
        name: "imagen"
        widget: "image"
        allow_multiple: false
        hint: "Sube la foto del producto (JPG o PNG recomendado)"

      - label: "Descripción"
        name: "descripcion"
        widget: "text"
        hint: "Descripción breve del producto para el modal de detalle"

      - label: "Producto Destacado"
        name: "destacado"
        widget: "boolean"
        default: false
        hint: "Aparece en la sección 🔥 Productos Destacados"

      - label: "Novedad"
        name: "novedad"
        widget: "boolean"
        default: false
        hint: "Aparece en la sección ✨ Novedades"

      - label: "Disponible"
        name: "disponible"
        widget: "boolean"
        default: true
        hint: "Desactiva para ocultar el producto sin eliminarlo"

  - name: "settings"
    label: "Configuración"
    files:
      - label: "Información del negocio"
        name: "business"
        file: "content/settings/business.json"
        fields:
          - { label: "Nombre del negocio", name: "nombre", widget: "string", default: "Bogotá Bling" }
          - { label: "Número WhatsApp", name: "whatsapp", widget: "string", default: "+573177810009" }
          - { label: "Mensaje WhatsApp", name: "wa_mensaje", widget: "text", default: "Hola, vi este producto en Bogotá Bling y me gustaría recibir más información." }
          - { label: "TikTok", name: "tiktok", widget: "string", default: "@bogotablingoficial" }
          - { label: "Ciudad", name: "ciudad", widget: "string", default: "Bogotá, Colombia" }
