backend:
  name: git-gateway
  branch: main

media_folder: "images/products"
public_folder: "/images/products"

locale: es

collections:
  - name: "products"
    label: "Productos"
    label_singular: "Producto"
    folder: "content/products"
    create: true
    delete: true
    slug: "{{slug}}"
    identifier_field: nombre
    summary: "{{nombre}} — {{categoria}}"
    fields:
      - label: "Nombre del producto"
        name: "nombre"
        widget: "string"
        hint: "Ej: Submariner Dorado"

      - label: "Categoría"
        name: "categoria"
        widget: "select"
        options:
          - { label: "⌚ Relojes para Hombre", value: "relojes-hombre" }
          - { label: "⌚ Relojes para Dama",   value: "relojes-dama"   }
          - { label: "💍 Anillos Oro Rosa",    value: "anillos-oro-rosa" }
          - { label: "💛 Anillos Oro 18k",     value: "anillos-oro-18k"  }
          - { label: "📿 Pulseras",            value: "pulseras"         }
          - { label: "⛓ Cadenas",             value: "cadenas"          }

      - label: "Precio"
        name: "precio"
        widget: "string"
        default: "Consultar"
        hint: "Ej: $350.000 o Consultar"

      - label: "Imagen principal"
        name: "imagen"
        widget: "image"
        allow_multiple: false
        hint: "Sube la foto del producto (JPG o PNG)"

      - label: "Descripción"
        name: "descripcion"
        widget: "text"
        hint: "Descripción breve del producto"

      - label: "Producto Destacado"
        name: "destacado"
        widget: "boolean"
        default: false
        hint: "Aparece en la sección Destacados"

      - label: "Novedad"
        name: "novedad"
        widget: "boolean"
        default: false
        hint: "Aparece en la sección Novedades"

      - label: "Disponible"
        name: "disponible"
        widget: "boolean"
        default: true
        hint: "Desactiva para ocultar sin eliminar"

  - name: "settings"
    label: "Configuración"
    files:
      - label: "Información del negocio"
        name: "business"
        file: "content/settings/business.json"
        fields:
          - { label: "Nombre del negocio", name: "nombre",     widget: "string" }
          - { label: "WhatsApp",           name: "whatsapp",   widget: "string" }
          - { label: "Mensaje WhatsApp",   name: "wa_mensaje", widget: "text"   }
          - { label: "TikTok",             name: "tiktok",     widget: "string" }
          - { label: "Ciudad",             name: "ciudad",     widget: "string" }
