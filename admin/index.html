<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="robots" content="noindex"/>
  <title>Admin — Bogotá Bling</title>
  <!-- Widget obligatorio de Autenticación de Netlify -->
  </script>
</head>
<body>
  <!-- Script Principal Estable de Decap CMS -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <!-- Conector definitivo para control de sesión y carga automática -->
  <script>
    if (window.netlifyIdentity) {
      // Escucha la inicialización de la identidad
      window.netlifyIdentity.on("init", user => {
        if (!user) {
          window.netlifyIdentity.on("login", () => {
            document.location.href = "/admin/";
          });
        }
      });

      // Escucha el cierre de sesión para evitar pantallas colgadas
      window.netlifyIdentity.on("logout", () => {
        document.location.href = "/admin/";
      });
    }
  </script>
</body>
</html>
